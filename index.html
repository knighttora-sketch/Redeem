<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redeem Tool Fix</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-top: 20px;
            position: relative;
        }

        /* Connection Status Indicator */
        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 12px;
            background: #334155;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: gray; }
        .dot.online { background: var(--success); box-shadow: 0 0 5px var(--success); }
        .dot.offline { background: var(--error); }

        header {
            background: linear-gradient(135deg, #4f46e5, var(--primary));
            padding: 25px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        header h1 { font-size: 1.3rem; margin-bottom: 5px; }

        .content-area { padding: 25px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        
        input {
            padding: 12px;
            background: #0f172a;
            border: 2px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            width: 100%;
            text-align: center;
            text-transform: uppercase;
        }
        input:focus { outline: none; border-color: var(--primary); }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { background: #475569; cursor: wait; }

        .logs-section {
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }
        .logs-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.9rem; color: var(--text-muted); }
        
        .log-list {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .log-item {
            background: #0f172a;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            border-left: 3px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-copy { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 2px 6px; border-radius: 4px; cursor: pointer; font-size: 0.7rem;}
        .btn-copy:hover { background: var(--border); color: white; }

        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 10px 20px; border-radius: 20px;
            font-size: 0.9rem; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Status Koneksi -->
        <div class="status-badge" id="connectionStatus">
            <div class="dot" id="statusDot"></div>
            <span id="statusText">Checking...</span>
        </div>

        <header>
            <h1>Redeem Global</h1>
        </header>

        <div class="content-area">
            <div class="form-group">
                <label>Nama</label>
                <input type="text" id="usernameInput" placeholder="Isi nama..." maxlength="12">
            </div>

            <div class="form-group">
                <label>Kode Redeem</label>
                <input type="text" id="codeInput" placeholder="KETIK KODE" maxlength="15">
            </div>

            <button class="btn" id="redeemBtn" onclick="processRedeem()">Tukar Hadiah</button>

            <div class="logs-section" style="margin-top:30px;">
                <div class="logs-header">
                    <span>Daftar Pemenang</span>
                    <span id="logCount">0</span>
                </div>
                <div class="log-list" id="logList">
                    <div style="text-align:center; color:#555; font-size:0.8rem;">Menunggu data...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // ==========================================
        // PENTING: ISI DATA FIREBASE ANDA DI SINI
        // ==========================================
        const firebaseConfig = {
            // HAPUS TEKS DIBAWAH INI DAN PASTE DARI FIREBASE CONSOLE
            apiKey: "AIzaSyBmmOJue97ewmU5XIoObY6Os22lrPKIcL8",
            authDomain: "torataro.firebaseapp.com",
            databaseURL: "https://torataro-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "torataro",
            storageBucket: "torataro.firebasestorage.app",
            messagingSenderId: "357999678278",
            appId: "1:357999678278:web:d7a4dcc62519fe45d88b47"
        };
        // ==========================================

        // Cek apakah config masih default (dummy)
        if (firebaseConfig.apiKey.includes("ISI_")) {
            alert("ERROR: Anda belum mengisi konfigurasi Firebase!\nSilakan buka file HTML ini dan edit bagian 'firebaseConfig'.");
            document.getElementById('statusText').innerText = "Config Error";
            document.getElementById('statusDot').classList.add('offline');
        } else {
            // Inisialisasi
            if (!firebase.apps.length) {
                try {
                    firebase.initializeApp(firebaseConfig);
                    
                    // Cek koneksi ke database
                    const connectedRef = firebase.database().ref(".info/connected");
                    connectedRef.on("value", (snap) => {
                        if (snap.val() === true) {
                            document.getElementById('statusText').innerText = "Online";
                            document.getElementById('statusDot').classList.add('online');
                        } else {
                            document.getElementById('statusText').innerText = "Offline";
                            document.getElementById('statusDot').classList.remove('online');
                        }
                    });

                } catch (e) {
                    console.error(e);
                    alert("Gagal koneksi ke Firebase. Cek lagi konfigurasi Anda.");
                    document.getElementById('statusText').innerText = "Error";
                    document.getElementById('statusDot').classList.add('offline');
                }
            }
        }

        const db = firebase.database();
        const codesRef = db.ref('redeem_codes');
        const logsRef = db.ref('redeem_logs');

        // Setup Data Awal (Jika kosong)
        codesRef.once('value', (snapshot) => {
            if (!snapshot.exists()) {
                const initCodes = {
                    "SULTAN": { reward: "💎 5000 Diamond", status: "active" },
                    "VIP777": { reward: "👑 Skin King", status: "active" },
                    "GEMS": { reward: "💎 1000 Gems", status: "active" }
                };
                codesRef.set(initCodes).then(() => console.log("DB Init"));
            }
        });

        // Listener Logs Realtime
        logsRef.limitToLast(50).on('value', (snapshot) => {
            const list = document.getElementById('logList');
            const count = document.getElementById('logCount');
            list.innerHTML = '';
            
            const data = [];
            snapshot.forEach(c => data.push(c.val()));
            data.reverse();
            count.innerText = data.length;

            if(data.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:#555; font-size:0.8rem;">Belum ada pemenang.</div>';
            } else {
                data.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'log-item';
                    el.innerHTML = `
                        <span>${item.name}</span>
                        <button class="btn-copy" onclick="navigator.clipboard.writeText('${item.name}')">Copy</button>
                    `;
                    list.appendChild(el);
                });
            }
        });

        // Logika Redeem
        function processRedeem() {
            const name = document.getElementById('usernameInput').value.trim();
            let code = document.getElementById('codeInput').value.trim();

            if(!name) return showToast("Isi nama dulu!");
            if(!code) return showToast("Isi kode!");

            // Hapus spasi berlebih dan jadikan huruf besar
            code = code.replace(/\s+/g, '').toUpperCase();

            // Transaction (Mencegah race condition)
            codesRef.child(code).transaction((currentData) => {
                if (!currentData) {
                    showToast("Kode tidak valid!", "error");
                    return; // Abort
                }
                if (currentData.status === 'used') {
                    showToast("Kode sudah dipakai!", "error");
                    return; // Abort
                }
                return { ...currentData, status: 'used' }; // Update status
            }, (error, committed, snapshot) => {
                if (error) {
                    console.error(error);
                    showToast("Koneksi bermasalah", "error");
                } else if (committed) {
                    // Sukses
                    const reward = snapshot.val().reward;
                    alert(`🎉 SELAMAT ${name}!\n\nAnda mendapatkan:\n${reward}`);
                    
                    logsRef.push({ name: name, time: new Date().toLocaleTimeString() });
                    
                    document.getElementById('usernameInput').value = '';
                    document.getElementById('codeInput').value = '';
                    showToast("Berhasil!", "success");
                }
            });
        }

        function showToast(msg, type='info') {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.backgroundColor = type === 'error' ? '#ef4444' : (type === 'success' ? '#10b981' : '#333');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
