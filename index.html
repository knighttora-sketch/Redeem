<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redeem Tool Final</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px; /* Sedikit diperlebar */
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-top: 20px;
            position: relative;
        }

        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 12px;
            background: #334155;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 10;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: gray; }
        .dot.online { background: var(--success); box-shadow: 0 0 5px var(--success); }

        header {
            background: linear-gradient(135deg, #4f46e5, var(--primary));
            padding: 25px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        header h1 { font-size: 1.3rem; margin-bottom: 5px; }

        .content-area { padding: 25px; }

        .form-group { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        
        input {
            padding: 12px;
            background: #0f172a;
            border: 2px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            width: 100%;
            text-align: center;
            text-transform: uppercase;
        }
        input:focus { outline: none; border-color: var(--primary); }
        /* Validasi hanya dengan warna border, tanpa teks hint */
        input.valid { border-color: var(--success); box-shadow: 0 0 5px rgba(16, 185, 129, 0.2); }
        input.invalid { border-color: var(--error); box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn:disabled { background: #475569; cursor: not-allowed; }

        .logs-section {
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }
        .logs-header { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 15px; 
            font-size: 0.9rem; 
            color: var(--text-muted); 
            align-items: center;
        }
        
        .log-list {
            max-height: 300px; /* Diperbesar tingginya */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
        }
        
        /* Scrollbar halus */
        .log-list::-webkit-scrollbar { width: 6px; }
        .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .log-item {
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            border-left: 3px solid var(--primary);
            display: flex;
            flex-direction: column; /* Susun vertikal */
            gap: 4px;
        }

        .log-top { display: flex; justify-content: space-between; align-items: center; }
        .log-name { font-weight: bold; color: var(--text-main); font-size: 0.95rem; }
        .log-date { font-size: 0.7rem; color: var(--text-muted); }

        .btn-copy { 
            background: transparent; 
            border: 1px solid var(--border); 
            color: var(--text-muted); 
            padding: 4px 8px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 0.7rem;
            margin-top: 5px;
            align-self: flex-start;
        }
        .btn-copy:hover { background: var(--border); color: white; }

        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 10px 20px; border-radius: 20px;
            font-size: 0.9rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 100;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-badge">
            <div class="dot online" id="statusDot"></div>
            <span id="statusText">Online</span>
        </div>

        <header>
            <h1>Redeem Tool</h1>
        </header>

        <div class="content-area">
            <div class="form-group">
                <label>Nama Pemenang</label>
                <input type="text" id="usernameInput" placeholder="Nama Anda..." maxlength="12">
            </div>

            <div class="form-group">
                <label>Kode Redeem</label>
                <input type="text" id="codeInput" placeholder="Ketik Kode..." maxlength="20" onkeyup="checkCodeLive()">
            </div>

            <button class="btn" id="redeemBtn" onclick="processRedeem()">Tukar Hadiah</button>

            <div class="logs-section" style="margin-top:30px;">
                <div class="logs-header">
                    <span>Riwayat Pemenang (200 Terakhir)</span>
                    <span id="logCount">0</span>
                </div>
                <div class="log-list" id="logList">
                    <div style="text-align:center; color:#555; font-size:0.8rem; padding: 20px;">Menunggu data...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBmmOJue97ewmU5XIoObY6Os22lrPKIcL8",
            authDomain: "torataro.firebaseapp.com",
            databaseURL: "https://torataro-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "torataro",
            storageBucket: "torataro.firebasestorage.app",
            messagingSenderId: "357999678278",
            appId: "1:357999678278:web:d7a4dcc62519fe45d88b47"
        };

        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const db = firebase.database();
        const codesRef = db.ref('codes'); 
        const logsRef = db.ref('logs');

        // Listener Logs (Diperbarui untuk menampilkan Tanggal)
        logsRef.limitToLast(200).on('value', (snapshot) => {
            const list = document.getElementById('logList');
            const count = document.getElementById('logCount');
            list.innerHTML = '';
            
            const data = [];
            snapshot.forEach(c => data.push(c.val()));
            data.reverse(); // Pemenang terbaru di atas
            count.innerText = data.length;

            if(data.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:#555; font-size:0.8rem; padding: 20px;">Belum ada pemenang.</div>';
            } else {
                data.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'log-item';
                    
                    // Format Tanggal Indonesia
                    const dateObj = new Date(item.timestamp);
                    const dateStr = dateObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                    const timeStr = dateObj.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

                    el.innerHTML = `
                        <div class="log-top">
                            <span class="log-name">👤 ${item.name}</span>
                            <span class="log-date">${dateStr}, ${timeStr}</span>
                        </div>
                        <button class="btn-copy" onclick="copyText('${item.name}')">Copy Nama</button>
                    `;
                    list.appendChild(el);
                });
            }
        });

        // Live Checker (Hanya ganti warna border, tanpa teks)
        function checkCodeLive() {
            const input = document.getElementById('codeInput');
            let cleanCode = input.value.toUpperCase().replace(/\s+/g, '');

            input.classList.remove('valid', 'invalid');

            if (cleanCode.length > 0) {
                codesRef.child(cleanCode).once('value').then(snapshot => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        if(data.status !== 'used') {
                            input.classList.add('valid'); // Hijau
                        } else {
                            input.classList.add('invalid'); // Merah
                        }
                    } else {
                        input.classList.add('invalid'); // Merah
                    }
                });
            }
        }

        async function processRedeem() {
            const name = document.getElementById('usernameInput').value.trim();
            const rawCode = document.getElementById('codeInput').value;
            const cleanCode = rawCode.toUpperCase().replace(/\s+/g, '');

            if(!name) return showToast("Isi nama!", "error");
            if(!cleanCode) return showToast("Isi kode!", "error");

            const btn = document.getElementById('redeemBtn');
            btn.disabled = true;
            btn.innerText = "Memproses...";

            try {
                const snapshot = await codesRef.child(cleanCode).once('value');
                
                if (!snapshot.exists()) {
                    throw new Error("KODE_TIDAK_VALID");
                }

                const data = snapshot.val();

                if (data.status === 'used') {
                    throw new Error("KODE_SUDAH_DIPAKAI");
                }

                // Update Status
                await codesRef.child(cleanCode).update({ status: 'used' });

                // SUKSES
                alert(`🎉 SELAMAT!\n\nNama: ${name}\nHadiah: ${data.reward}`);
                
                // Simpan Log dengan Timestamp (Waktu Server)
                logsRef.push({ 
                    name: name, 
                    timestamp: firebase.database.ServerValue.TIMESTAMP 
                });
                
                // Reset Form
                document.getElementById('usernameInput').value = '';
                document.getElementById('codeInput').value = '';
                document.getElementById('codeInput').classList.remove('valid');
                showToast("Berhasil!", "success");

            } catch (error) {
                console.error(error);
                if (error.message === "KODE_TIDAK_VALID") {
                    showToast("Kode Tidak Valid!", "error");
                } else if (error.message === "KODE_SUDAH_DIPAKAI") {
                    showToast("Kode sudah dipakai!", "error");
                } else {
                    showToast("Terjadi kesalahan koneksi.", "error");
                }
            } finally {
                btn.disabled = false;
                btn.innerText = "Tukar Hadiah";
            }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => showToast("Nama disalin!"));
        }

        function showToast(msg, type='info') {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.backgroundColor = type === 'error' ? '#ef4444' : (type === 'success' ? '#10b981' : '#333');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
