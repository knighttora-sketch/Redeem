<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Lokasi Database</title>
    <style>
        body { background: #111; color: #0f0; font-family: monospace; padding: 20px; }
        .box { border: 1px solid #333; padding: 20px; margin-bottom: 20px; }
        button { padding: 10px 20px; background: #333; color: white; border: none; cursor: pointer; }
        button:hover { background: #555; }
        #result { white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🔍 DEBUG: Cari Kode 'SULTAN'</h2>
        <p>Klik tombol di bawah untuk mencari keberadaan kode 'SULTAN' di seluruh database Anda.</p>
        <button onclick="findCode()">Cari Sekarang</button>
    </div>

    <div class="box">
        <h3>Hasil Pencarian:</h3>
        <div id="result">Menunggu...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // ISI KONFIGURASI ANDA DI SINI
        const firebaseConfig = {
            apiKey: "AIzaSyBmmOJue97ewmU5XIoObY6Os22lrPKIcL8",
            authDomain: "torataro.firebaseapp.com",
            databaseURL: "https://torataro-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "torataro",
            storageBucket: "torataro.firebasestorage.app",
            messagingSenderId: "357999678278",
            appId: "1:357999678278:web:d7a4dcc62519fe45d88b47"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function findCode() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = "Sedang memindai database...";
            
            const codeToFind = "SULTAN"; // Kode yang ingin dicari
            let foundPath = null;

            // 1. Cek di Root langsung (misal: root -> SULTAN)
            try {
                const snap = await db.ref(codeToFind).once('value');
                if (snap.exists()) {
                    foundPath = `ROOT -> ${codeToFind}`;
                }
            } catch(e) {}

            // 2. Cek di folder 'codes' (misal: root -> codes -> SULTAN)
            if (!foundPath) {
                try {
                    const snap = await db.ref('codes/' + codeToFind).once('value');
                    if (snap.exists()) {
                        foundPath = `ROOT -> codes -> ${codeToFind}`;
                    }
                } catch(e) {}
            }

            // 3. Cek di folder 'redeem_codes' (default script lama)
            if (!foundPath) {
                try {
                    const snap = await db.ref('redeem_codes/' + codeToFind).once('value');
                    if (snap.exists()) {
                        foundPath = `ROOT -> redeem_codes -> ${codeToFind}`;
                    }
                } catch(e) {}
            }

            // HASIL
            if (foundPath) {
                resultDiv.innerHTML = `<span style="color:#0f0">✅ KETEMU!</span><br>Lokasi: ${foundPath}<br><br>Gunakan path ini di script utama Anda.`;
            } else {
                resultDiv.innerHTML = `<span style="color:red">❌ TIDAK KETEMU</span><br>Pastikan Anda sudah menambahkan kode 'SULTAN' di Firebase Console.`;
                
                // Tampilkan isi root untuk bantuan
                db.ref('/').once('value').then(snap => {
                    resultDiv.innerHTML += `<br><br>Isi Root Database Anda:<br>${JSON.stringify(snap.val(), null, 2)}`;
                });
            }
        }
    </script>
</body>
</html>
