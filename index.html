<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redeem Global Realtime</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            overflow: hidden;
            margin-top: 20px;
        }

        header {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            padding: 25px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        header h1 { font-size: 1.4rem; margin-bottom: 5px; }
        header p { font-size: 0.85rem; opacity: 0.9; }

        .content-area { padding: 25px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }

        input {
            padding: 12px;
            background: #0f172a;
            border: 2px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }

        input[type="text"] { 
            width: 100%; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        input[type="text"]:focus { outline: none; border-color: var(--primary); }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }
        .btn:hover { background: var(--primary-dark); }

        /* Logs Style */
        .logs-section {
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .logs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .logs-header h3 { font-size: 1rem; color: var(--text-muted); }
        .badge { background: var(--border); padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; }

        .log-list {
            max-height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 5px;
        }

        .log-list::-webkit-scrollbar { width: 6px; }
        .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .log-item {
            background: #0f172a;
            padding: 12px 15px;
            border-radius: 8px;
            border-left: 3px solid var(--primary);
            font-weight: bold;
            font-size: 0.95rem;
            color: var(--text-main);
            animation: slideIn 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .btn-copy {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .btn-copy:hover { background: var(--border); color: white; }

        .empty-state { text-align: center; color: var(--text-muted); font-size: 0.85rem; padding: 10px; }

        /* Loading & Toast */
        #loader { display: none; text-align: center; margin: 10px; color: var(--text-muted); font-size: 0.9rem;}
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 10px 20px; border-radius: 30px;
            font-size: 0.9rem; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Global Redeem</h1>
            <p>Live Database via Firebase</p>
        </header>

        <div class="content-area">
            <div id="loader">Menghubungkan ke Database...</div>

            <div class="form-group">
                <label>Masukkan Identitas</label>
                <div class="input-row">
                    <input type="text" id="usernameInput" placeholder="Nama Kamu..." maxlength="12">
                </div>
            </div>

            <div class="form-group">
                <label>Masukkan Kode</label>
                <div class="input-row">
                    <input type="text" id="codeInput" placeholder="XXXX-XXXX" maxlength="15">
                </div>
                <button class="btn" onclick="processRedeem()">Tukar Hadiah</button>
            </div>

            <!-- Section Logs Pemenang -->
            <div class="logs-section">
                <div class="logs-header">
                    <h3>Daftar Pemenang (Live)</h3>
                    <span class="badge" id="logCount">0</span>
                </div>
                
                <div class="log-list" id="logListContainer">
                    <div class="empty-state">Menunggu koneksi database...</div>
                </div>
            </div>

        </div>
    </div>

    <div id="toast" class="toast">Notifikasi</div>

    <!-- FIREBASE SDK (Versi 8 - Kompatibel) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // --- 1. KONFIGURASI FIREBASE ---
        // GANTI BAGIAN INI DENGAN DATA DARI CONSOLE FIREBASE ANDA
        const firebaseConfig = {
            // --- PASTE KONFIGURASI FIREBASE DISINI ---
            apiKey: "AIzaSyBmmOJue97ewmU5XIoObY6Os22lrPKIcL8",
            authDomain: "torataro.firebaseapp.com",
            databaseURL: "https://torataro-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "torataro",
            storageBucket: "torataro.firebasestorage.app",
            messagingSenderId: "357999678278",
            appId: "1:357999678278:web:d7a4dcc62519fe45d88b47"
            // ---------------------------------------
        };

        // Inisialisasi Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // Referensi Database
        const codesRef = db.ref('codes');
        const logsRef = db.ref('logs');

        // --- 2. INISIALISASI DATA KODE (Hanya dijalankan sekali oleh Admin/Pertama kali) ---
        // Kita cek apakah data 'codes' sudah ada, jika belum, isi dengan data default
        codesRef.once('value', (snapshot) => {
            document.getElementById('loader').style.display = 'none';
            if (!snapshot.exists()) {
                // Data default kode
                const defaultCodes = {
                    "SULTAN": { name: "💎 5000 Diamond", status: "active" },
                    "VIP777": { name: "👑 Skin King", status: "active" },
                    "GEMS": { name: "💎 1000 Gems", status: "active" },
                    "TESTGA": { name: "💎 1000 Gems", status: "active" },
                    "TEST": { name: "🎁 Mystery Box", status: "active" }
                };
                codesRef.set(defaultCodes).then(() => {
                    console.log("Database kode berhasil dibuat.");
                });
            }
        });

        // --- 3. FUNGSI LISTEN LOGS (Realtime) ---
        // Fungsi ini otomatis update tampilan jika ada pemenang baru di HP lain
        logsRef.limitToLast(50).on('value', (snapshot) => {
            const container = document.getElementById('logListContainer');
            const badge = document.getElementById('logCount');
            container.innerHTML = ''; // Bersihkan list

            const logs = [];
            snapshot.forEach((childSnapshot) => {
                logs.push(childSnapshot.val());
            });
            // Balik urutan agar yang terbaru di atas
            logs.reverse();

            badge.textContent = logs.length;

            if (logs.length === 0) {
                container.innerHTML = '<div class="empty-state">Belum ada pemenang.</div>';
                return;
            }

            logs.forEach(log => {
                const div = document.createElement('div');
                div.className = 'log-item';
                div.innerHTML = `
                    <span>👤 ${log.name}</span>
                    <button class="btn-copy" onclick="copyName('${log.name}')">Copy</button>
                `;
                container.appendChild(div);
            });
        });

        // --- 4. LOGIKA UTAMA ---
        function processRedeem() {
            const nameIn = document.getElementById('usernameInput');
            const codeIn = document.getElementById('codeInput');
            
            const name = nameIn.value.trim();
            const code = codeIn.value.trim().toUpperCase();

            if (!name) return showToast("Isi nama kamu dulu!");
            if (!code) return showToast("Isi kode redeem!");

            // Ambil data kode dari Firebase secara realtime (Transaction)
            // Transaction dipakai agar mencegah 2 orang redeem kode yang sama persis di waktu yang sama
            codesRef.child(code).transaction((currentData) => {
                if (currentData === null) {
                    // Kode tidak ditemukan
                    showToast("Kode tidak valid!", "error");
                    return; // Batalkan transaksi
                }
                if (currentData.status === 'used') {
                    // Kode sudah dipakai
                    showToast("Kode sudah dipakai orang lain!", "error");
                    return; // Batalkan transaksi
                }
                
                // Jika kode valid dan aktif, ubah status jadi 'used'
                return { ...currentData, status: 'used' };
            }, (error, committed, snapshot) => {
                if (error) {
                    console.error(error);
                    showToast("Terjadi kesalahan koneksi.", "error");
                } else if (committed) {
                    // Jika committed = true, berarti status berhasil diubah ke 'used'
                    const rewardData = snapshot.val();
                    
                    // 1. Tampilkan Alert di HP user ini
                    alert(`🎉 SELAMAT!\n\nNama: ${name}\nHadiah: ${rewardData.name}\n\nKode berhasil ditukar.`);

                    // 2. Simpan Log Pemenang ke Firebase (Agar muncul di HP lain)
                    logsRef.push({
                        name: name,
                        date: new Date().toISOString()
                    });

                    // 3. Bersihkan Input
                    nameIn.value = '';
                    codeIn.value = '';
                    showToast("Berhasil! Cek daftar pemenang.");
                }
            });
        }

        // --- HELPER FUNCTIONS ---
        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.backgroundColor = type === 'error' ? '#ef4444' : '#333';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function copyName(name) {
            navigator.clipboard.writeText(name).then(() => {
                showToast(`Nama "${name}" disalin!`);
            });
        }
    </script>
</body>
</html>
